<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0E4D64">
<title>Panel de Cobranza — Arts Nova MutuClub</title>
<style>
  :root{
    --azul:#0E4D64; --azul-2:#0A3A4D; --azul-soft:#E4EEF1;
    --verde:#1FA37A; --verde-soft:#E3F3EC;
    --ambar:#C8861A; --ambar-soft:#FBF0DC;
    --rojo:#B23A3A; --rojo-soft:#FBE9E9;
    --azulinfo:#2D6FB8; --azulinfo-soft:#E6EFF8;
    --bg:#EFF2F3; --surface:#FFFFFF; --ink:#13242B; --muted:#5C6B71;
    --line:#DCE3E5; --line-2:#C7D1D4;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(16,40,50,.05), 0 4px 16px rgba(16,40,50,.05);
    --side:236px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--azul)}
  .hidden{display:none !important}

  /* ---- Login ---- */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(165deg,#0E4D64,#0A3A4D)}
  .login .panel{background:#fff;border-radius:18px;padding:30px;max-width:400px;width:100%;box-shadow:0 16px 50px rgba(0,0,0,.3)}
  .login .logo{width:60px;height:60px;border-radius:16px;background:var(--azul);color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px;margin:0 auto 16px}
  .login h2{text-align:center;margin:0 0 2px;font-size:20px}
  .login p.s{text-align:center;color:var(--muted);font-size:13px;margin:0 0 22px}

  /* ---- App shell ---- */
  .shell{display:flex;min-height:100vh}
  .sidebar{width:var(--side);background:var(--azul);color:#fff;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:30}
  .sidebar .brand{padding:20px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.12)}
  .sidebar .brand .lg{width:38px;height:38px;border-radius:11px;background:#fff;color:var(--azul);display:grid;place-items:center;font-weight:800;font-size:16px}
  .sidebar .brand b{font-size:15px;font-weight:600;line-height:1.2}
  .sidebar .brand span{font-size:11px;opacity:.75;display:block}
  .nav{flex:1;padding:12px 10px;overflow:auto}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;color:#fff;padding:11px 12px;border-radius:10px;font-size:14.5px;text-align:left;margin-bottom:2px;opacity:.82}
  .nav button:hover{background:rgba(255,255,255,.1);opacity:1}
  .nav button.active{background:rgba(255,255,255,.16);opacity:1;font-weight:600}
  .nav .ic{width:20px;text-align:center}
  .sidebar .foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.12);font-size:12.5px}
  .sidebar .foot .u{font-weight:600;margin-bottom:2px}
  .sidebar .foot button{margin-top:8px;background:rgba(255,255,255,.14);border:none;color:#fff;width:100%;padding:8px;border-radius:8px;font-size:13px}

  .main{flex:1;margin-left:var(--side);padding:24px 28px;max-width:1180px}
  .pagehead{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  .pagehead h1{font-size:22px;margin:0;font-weight:600}
  .pagehead .sub{color:var(--muted);font-size:13px}

  /* ---- Componentes ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:18px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .kpi{padding:16px 18px}
  .kpi .lbl{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-.5px}
  .kpi .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .kpi.accent{border-top:3px solid var(--azul)}
  .kpi.warn{border-top:3px solid var(--ambar)}
  .kpi.good{border-top:3px solid var(--verde)}
  .kpi.bad{border-top:3px solid var(--rojo)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--radius-sm);background:var(--azul);color:#fff;font-weight:600;font-size:14px;padding:10px 16px;min-height:42px}
  .btn:active{transform:translateY(1px)}
  .btn.green{background:var(--verde)}
  .btn.ghost{background:#fff;color:var(--azul);border:1.5px solid var(--line-2)}
  .btn.sm{min-height:34px;padding:6px 12px;font-size:13px}
  .btn.tiny{min-height:30px;padding:4px 10px;font-size:12.5px;font-weight:600;border-radius:8px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.pend{background:var(--ambar-soft);color:#8a5d0f}
  .pill.sync{background:var(--azulinfo-soft);color:#1d4f86}
  .pill.valid{background:var(--verde-soft);color:#10684c}
  .pill.rech{background:var(--rojo-soft);color:#8c2a2a}
  .pill.alert{background:var(--rojo-soft);color:#8c2a2a}
  .pill.ok{background:var(--verde-soft);color:#10684c}
  .pill.dot::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}

  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f7fafb}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow:auto;border-radius:var(--radius)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff}
  .toolbar .search{flex:1;min-width:180px}
  .seg{display:inline-flex;background:#fff;border:1.5px solid var(--line-2);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:none;padding:8px 13px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.on{background:var(--azul);color:#fff}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff;color:var(--ink);outline:none}
  .field input:focus,.field select:focus{border-color:var(--azul)}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .sectiontitle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:6px 2px 10px}
  .empty{text-align:center;color:var(--muted);padding:34px 18px}

  /* ---- Chart ---- */
  .bar{fill:var(--azul)}
  .barlbl{font-size:10.5px;fill:var(--muted)}
  .barval{font-size:10.5px;fill:var(--ink);font-weight:600}

  /* ---- Modal ---- */
  .modal{position:fixed;inset:0;background:rgba(10,25,30,.5);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px}
  .modal .box{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .hd{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
  .modal .hd h3{margin:0;font-size:18px}
  .modal .bd{padding:20px}
  .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}.kv span{color:var(--muted)}.kv b{text-align:right}

  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#13242B;color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:120;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:820px){
    :root{--side:0px}
    .sidebar{transform:translateX(-100%);transition:.25s;width:236px}
    .sidebar.open{transform:none}
    .main{margin-left:0;padding:18px}
    .menuBtn{display:inline-flex !important}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25}
  }
  .menuBtn{display:none}
</style>
</head>

<div id="loginScreen" class="login">

   Mismo modelo de datos y misma llave que la app del cobrador,
   por lo que (mismo origen / navegador) ve los pagos en vivo.
   ============================================================ */

const U = {
  async sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')},
  money(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})},
  money0(n){return '$'+Number(n||0).toLocaleString('es-MX',{maximumFractionDigits:0})},
  fc(d){return d?new Date(d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'—'},
  fh(d){return new Date(d).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})},
  ini(n){return (n||'').split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase()},
  hoyISO(){return new Date().toISOString().slice(0,10)},
  esHoy(iso){return new Date(iso).toDateString()===new Date().toDateString()},
  diasAtras(iso,n){const d=new Date();d.setDate(d.getDate()-n);return new Date(iso)>=new Date(d.toDateString())},
  esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
};

    if(!this.data.empresa) this.data.empresa={};
    return this.data;

  save(){localStorage.setItem(this.KEY,LZString.compressToUTF16(JSON.stringify(this.data)))},

/* ---------- Catálogos ---------- */
const ESTATUS = {pendiente:{cls:'pend',txt:'Pendiente'},sincronizado:{cls:'sync',txt:'Sincronizado'},validado:{cls:'valid',txt:'Validado'},rechazado:{cls:'rech',txt:'Rechazado'}};

/* ============================================================
   SINCRONIZACIÓN con backend Apps Script
   Pega aquí la MISMA URL /exec que pusiste en la app del cobrador.
   En blanco = modo local (lee localStorage compartido).        */
const API_URL = 'https://script.google.com/macros/s/AKfycbwp3jwcASHGbIoOKrWI6Gx_-40WRtYXBaK3dIwOmGY3PZpM3ArfQy5YD7IvV5zXo9F-UA/exec';

const Net = {
  conectado(){ return API_URL.indexOf('http')===0; },
  async pull(){
    if(!this.conectado()) return false;
    const d = await jsonp(API_URL+'?action=pull');
    if(!d || !d.ok) return false;
    if(d.usuarios && d.usuarios.length) DB.data.usuarios = d.usuarios;
    if(d.clientes && d.clientes.length) DB.data.clientes = d.clientes;
    if(d.pagos){
      const pendLocal = DB.data.pagos.filter(p=>p.estatus==='pendiente');
      const enSrv = new Set(d.pagos.map(p=>p.folio));
      DB.data.pagos = [...pendLocal.filter(p=>!enSrv.has(p.folio)), ...d.pagos]
        .sort((a,b)=> (Number(b.creadoEn)||0)-(Number(a.creadoEn)||0));
    }
    DB.save();
    return true;
  },
  async post(payload){
    if(!this.conectado()) return;
    await fetch(API_URL, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
  },
  async firma(folio){
    if(!this.conectado()) return '';
    const d = await jsonp(API_URL+'?action=firma&folio='+encodeURIComponent(folio));
    return (d && d.firma) || '';
  }
};
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='__adm_cb'+Date.now();
    const s=document.createElement('script');
    const to=setTimeout(()=>{cleanup();reject(new Error('timeout'))},12000);
    function cleanup(){clearTimeout(to);delete window[cb];s.remove();}
    window[cb]=d=>{cleanup();resolve(d);};
    s.onerror=()=>{cleanup();reject(new Error('jsonp'))};
    s.src=url+(url.indexOf('?')<0?'?':'&')+'callback='+cb;
    document.body.appendChild(s);
  });
}

  barChart(data){

      bars+=`<rect class="bar" x="${x}" y="${y}" width="${bw}" height="${Math.max(2,h)}" rx="5"/>`;
      bars+=`<text class="barval" x="${x+bw/2}" y="${y-5}" text-anchor="middle">${d.value?U.money0(d.value):''}</text>`;
      bars+=`<text class="barlbl" x="${x+bw/2}" y="${H-12}" text-anchor="middle">${d.label}</text>`;

      body:pagos.map(p=>[p.folio,U.fc(p.fecha),p.metodo,ESTATUS[p.estatus].txt,U.money(p.importe)]),
      styles:{fontSize:9},headStyles:{fillColor:[14,77,100]}});
    doc.save(`EstadoCuenta_${c.poliza}.pdf`);this.toast('PDF generado');
  },

  /* ============ REPORTES ============ */
  renderReportes(){
    this.head('Reportes','Generación y exportación');
    const reps=[['diaria','Cobranza diaria'],['cobrador','Cobranza por cobrador'],['vencidos','Pagos vencidos'],['morosos','Clientes morosos'],['arqueo','Arqueo de caja'],['efectividad','Efectividad de cobranza'],['ruta','Ruta de cobranza'],['historial','Historial de pagos']];
    document.getElementById('view').innerHTML=`
      <div class="toolbar">
        <select onchange="Admin.reporteActual=this.value;Admin.renderReporteBody()" style="min-width:240px">
          ${reps.map(([k,t])=>`<option value="${k}" ${this.reporteActual===k?'selected':''}>${t}</option>`).join('')}
        </select>
        <button class="btn ghost sm" onclick="Admin.exportReporteCSV()">⬇ Excel</button>
        <button class="btn ghost sm" onclick="Admin.exportReportePDF()">⬇ PDF</button>
      </div>
      <div class="card tablewrap" id="reporteBody"></div>
      <div id="reporteSub" style="margin-top:10px;color:var(--muted);font-size:13px"></div>`;
    this.renderReporteBody();
  },
  reporteData(){
    const pg=DB.data.pagos.filter(p=>p.estatus!=='rechazado');
    switch(this.reporteActual){
      case 'diaria':{
        const map={};pg.forEach(p=>{const k=new Date(p.fecha).toDateString();(map[k]=map[k]||{n:0,m:0,ef:0});map[k].n++;map[k].m+=p.importe;if(p.metodo==='Efectivo')map[k].ef+=p.importe;});
        const body=Object.entries(map).sort((a,b)=>new Date(b[0])-new Date(a[0])).map(([k,v])=>[U.fc(k),v.n,U.money(v.m),U.money(v.ef)]);
        return {head:['Fecha','Pagos','Total','Efectivo'],body,title:'Cobranza diaria'};}
      case 'cobrador':{
        const cobs=DB.data.usuarios.filter(u=>u.rol==='cobrador');
        const body=cobs.map(c=>{const ps=pg.filter(p=>p.cobradorId===c.id);return [c.nombre,c.prefijo,ps.length,U.money(ps.reduce((s,p)=>s+p.importe,0))];});
        return {head:['Cobrador','Prefijo','Pagos','Total cobrado'],body,title:'Cobranza por cobrador'};}
      case 'vencidos':{
        const body=DB.data.clientes.filter(c=>this.vencido(c)).map(c=>[c.nombre,c.poliza,U.fc(c.proxVenc),U.money(c.saldo),c.cobradorNombre||this.cobNombre(c.cobradorId)]);
        return {head:['Cliente','Póliza','Venció','Saldo','Cobrador'],body,title:'Pagos vencidos'};}
      case 'morosos':{
        const body=DB.data.clientes.filter(c=>c.estatus==='moroso'||this.vencido(c)).sort((a,b)=>b.saldo-a.saldo).map(c=>[c.nombre,c.telefono,U.money(c.saldo),U.money(c.mensualidad),U.fc(c.proxVenc)]);
        return {head:['Cliente','Teléfono','Saldo','Mensualidad','Próx. venc.'],body,title:'Clientes morosos'};}
      case 'arqueo':{
        const hoy=pg.filter(p=>U.esHoy(p.fecha));const cobs=DB.data.usuarios.filter(u=>u.rol==='cobrador');
        const body=cobs.map(c=>{const ps=hoy.filter(p=>p.cobradorId===c.id);const ef=ps.filter(p=>p.metodo==='Efectivo').reduce((s,p)=>s+p.importe,0);const ot=ps.filter(p=>p.metodo!=='Efectivo').reduce((s,p)=>s+p.importe,0);return [c.nombre,ps.length,U.money(ef),U.money(ot),U.money(ef+ot)];}).filter(r=>r[1]>0);
        return {head:['Cobrador','Pagos hoy','Efectivo','Otros','Total'],body,title:'Arqueo de caja (hoy)'};}
      case 'efectividad':{
        const cobs=DB.data.usuarios.filter(u=>u.rol==='cobrador');
        const body=cobs.map(c=>{const ps=pg.filter(p=>p.cobradorId===c.id);const val=ps.filter(p=>p.estatus==='validado').length;const ef=ps.length?Math.round(val/ps.length*100):0;return [c.nombre,ps.length,val,ps.length-val,ef+'%'];});
        return {head:['Cobrador','Total','Validados','Pendientes','Efectividad'],body,title:'Efectividad de cobranza'};}
      case 'ruta':{
        const body=DB.data.clientes.slice().sort((a,b)=>new Date(a.proxVenc)-new Date(b.proxVenc)).map(c=>[c.nombre,c.direccion,c.telefono,U.money(c.saldo),this.vencido(c)?'VENCIDO':'al día',this.cobNombre(c.cobradorId)]);
        return {head:['Cliente','Dirección','Teléfono','Saldo','Estatus','Cobrador'],body,title:'Ruta de cobranza'};}
      case 'historial':{
        const body=pg.slice().sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(p=>[p.folio,U.fc(p.fecha),p.clienteNombre,p.metodo,ESTATUS[p.estatus].txt,U.money(p.importe)]);
        return {head:['Folio','Fecha','Cliente','Método','Estatus','Importe'],body,title:'Historial de pagos'};}
    }
  },
  renderReporteBody(){
    const r=this.reporteData();
    document.getElementById('reporteBody').innerHTML=`<table><thead><tr>${r.head.map((h,i)=>`<th class="${i>=r.head.length-1?'num':''}">${h}</th>`).join('')}</tr></thead>
      <tbody>${r.body.length?r.body.map(row=>`<tr>${row.map((c,i)=>`<td class="${i>=r.head.length-1?'num':''}">${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${r.head.length}"><div class="empty">Sin datos para este reporte.</div></td></tr>`}</tbody></table>`;
    document.getElementById('reporteSub').textContent=`${r.body.length} fila(s) · ${r.title}`;
  },
  exportReporteCSV(){const r=this.reporteData();this._csv(r.title.replace(/ /g,'_'),r.head,r.body.map(row=>row.map(c=>String(c).replace(/\$|,/g,''))));},
  exportReportePDF(){
    const r=this.reporteData();const {jsPDF}=window.jspdf;const doc=new jsPDF(r.head.length>5?{orientation:'landscape'}:{});
    doc.setFontSize(15);doc.text(r.title,14,18);
    doc.setFontSize(9);doc.text(`${DB.data.empresa.nombre} · ${U.fc(new Date())}`,14,25);
    doc.autoTable({startY:31,head:[r.head],body:r.body,styles:{fontSize:8.5},headStyles:{fillColor:[14,77,100]}});
    doc.save(r.title.replace(/ /g,'_')+'.pdf');this.toast('PDF generado');
  },

  /* ============ CONFIGURACIÓN ============ */
  renderConfig(){
    this.head('Configuración','Empresa, usuarios y datos');
    const e=DB.data.empresa;
    document.getElementById('view').innerHTML=`
      <div class="grid" style="grid-template-columns:1fr 1fr;align-items:start">
        <div class="card pad">
          <div class="sectiontitle">Datos de la empresa</div>
          ${['nombre','direccion','tels','rfc','mensaje','aviso'].map(k=>`<div class="field"><label>${k}</label><input id="cf_${k}" value="${U.esc(e[k]||'')}"></div>`).join('')}
          <button class="btn" onclick="Admin.saveEmpresa()">Guardar datos</button>
        </div>
        <div>
          <div class="card pad" style="margin-bottom:16px">
            <div class="sectiontitle">Usuarios</div>
            <div class="tablewrap"><table><thead><tr><th>Usuario</th><th>Rol</th><th>Estado</th><th></th></tr></thead><tbody>
            ${DB.data.usuarios.map(u=>`<tr>
              <td><b>${u.nombre}</b><div style="font-size:12px;color:var(--muted)">${u.usuario}</div></td>
              <td>${u.rol}</td>
              <td>${u.activo?'<span class="pill ok">Activo</span>':'<span class="pill rech">Inactivo</span>'}</td>
              <td style="text-align:right"><button class="btn ghost tiny" onclick="Admin.toggleUser('${u.id}')">${u.activo?'Baja':'Alta'}</button></td>
            </tr>`).join('')}
            </tbody></table></div>
          </div>
          <div class="card pad">
            <div class="sectiontitle">Mantenimiento</div>
            <button class="btn ghost" onclick="Admin.showBitacora()">Ver bitácora de movimientos</button>
            <button class="btn ghost" style="margin-top:10px;width:100%;color:var(--rojo);border-color:#f0caca" onclick="Admin.confirmReset()">Reiniciar datos demo</button>
          </div>
        </div>
      </div>`;
    if(window.innerWidth<820)document.querySelector('#view .grid').style.gridTemplateColumns='1fr';
  },
  saveEmpresa(){['nombre','direccion','tels','rfc','mensaje','aviso'].forEach(k=>DB.data.empresa[k]=document.getElementById('cf_'+k).value);DB.save();this.bitacora('Actualizó datos de empresa');this.toast('Datos guardados');},
  toggleUser(id){const u=DB.data.usuarios.find(x=>x.id===id);if(u.id===this.user.id){this.toast('No puedes darte de baja a ti mismo');return;}u.activo=!u.activo;DB.save();this.bitacora((u.activo?'Alta':'Baja')+' usuario '+u.usuario);this.renderConfig();},
  showBitacora(){
    const items=DB.data.bitacora.slice(0,60).map(b=>`<div class="kv"><span>${U.esc(b.accion)}<br><small style="opacity:.7">${b.usuario}</small></span><b style="font-size:12px;color:var(--muted)">${U.fh(b.fecha)}</b></div>`).join('')||'<div class="empty">Sin registros.</div>';
    this.modal('Bitácora',`<div style="max-height:60vh;overflow:auto">${items}</div>`);
  },
  confirmReset(){this.modal('¿Reiniciar datos demo?',`<p style="color:var(--muted)">Se borrarán todos los pagos y se restaurará la demo. No se puede deshacer.</p><button class="btn" style="background:var(--rojo);width:100%" onclick="Admin.doReset()">Sí, reiniciar</button>`);},
  doReset(){DB.reset();this.closeModal();this.toast('Datos reiniciados');this.go('dashboard');},

  /* ============ Export genérico ============ */
  exportCSV(tipo){
    if(tipo==='pagos'){
      const rows=this.pagosFiltrados().map(p=>[p.folio,p.fecha,p.clienteNombre,p.poliza,p.importe,p.metodo,p.proxVenc,p.estatus,p.cobradorNombre,p.lat||'',p.lng||'',(p.observaciones||'').replace(/[;\n]/g,' ')]);
      this._csv('Pagos_para_Access',['Folio','Fecha','Cliente','Poliza','Importe','Metodo','ProxVenc','Estatus','Cobrador','Lat','Lng','Observaciones'],rows);
    }else if(tipo==='clientes'){
      const rows=DB.data.clientes.map(c=>[c.poliza,c.nombre,c.telefono,c.vehiculo,c.placas,c.saldo,c.mensualidad,c.proxVenc,c.estatus]);
      this._csv('Clientes',['Poliza','Nombre','Telefono','Vehiculo','Placas','Saldo','Mensualidad','ProxVenc','Estatus'],rows);
    }
  },
  _csv(name,head,rows){
    const csv='\uFEFF'+[head,...rows].map(r=>r.join(';')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download=name+'.csv';a.click();this.toast('Exportado: '+rows.length+' fila(s)');
  },

  /* ---- helpers ---- */
  vencido(c){return new Date(c.proxVenc)<new Date(new Date().toDateString())},
  cobNombre(id){const u=DB.data.usuarios.find(x=>x.id===id);return u?u.nombre:'—'},
  bitacora(a){DB.data.bitacora.unshift({fecha:new Date().toISOString(),usuario:this.user?.usuario||'-',accion:a});DB.data.bitacora=DB.data.bitacora.slice(0,300);DB.save();},
  toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(this._t);this._t=setTimeout(()=>t.classList.remove('show'),2400);},
  modal(title,html){document.getElementById('modalRoot').innerHTML=`<div class="modal" onclick="if(event.target===this)Admin.closeModal()"><div class="box"><div class="hd"><h3>${title}</h3><button class="x" onclick="Admin.closeModal()">×</button></div><div class="bd">${html}</div></div></div>`;},
  closeModal(){document.getElementById('modalRoot').innerHTML='';}
};

Admin.init();
</script>
</body>
</html>
